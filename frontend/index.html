<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Git Tracking Dashboard</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">◇</span>
      <div>
        <h1>Git Tracking Dashboard</h1>
        <p class="tagline">Theo dõi tiến độ từ OpenProject và GitHub integration.</p>
      </div>
    </div>
    <div class="source-hint">
      <span class="dot"></span>
      Source of truth: <code>OpenProject</code>
      <a href="settings.html">Rule giờ</a>
    </div>
  </header>

  <main class="layout dashboard-layout">
    <section class="card progress-card">
      <div class="progress-header">
        <h2>Tiến độ sprint</h2>
        <button id="progress-refresh-btn">Làm mới</button>
      </div>

      <div class="progress-filters">
        <select id="progress-project-select">
          <option value="">Chọn dự án</option>
        </select>
        <select id="progress-member-select" disabled>
          <option value="">Chọn thành viên</option>
        </select>
        <select id="progress-sprint-select" disabled>
          <option value="">Chọn sprint</option>
        </select>
      </div>

      <p id="progress-status" class="status-line neutral"></p>

      <div id="progress-summary" class="progress-summary"></div>
      <div id="task-controls" class="task-controls"></div>
      <div id="task-board" class="task-board">
        <p class="empty-state">Chọn dự án, thành viên và sprint để xem tiến độ.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
