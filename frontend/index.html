<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Git Tracking Dashboard</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <div>
        <h1>Git Tracking Dashboard</h1>
        <p class="tagline">Sprint delivery intelligence từ OpenProject và GitHub integration.</p>
      </div>
    </div>
    <div class="source-hint">
      <span class="dot"></span>
      Source of truth: <code>OpenProject</code>
      <a href="settings.html">Rule giờ</a>
    </div>
  </header>

  <main class="layout dashboard-layout">
    <section class="progress-card">
      <div class="progress-header">
        <div>
          <h2>Tiến độ sprint</h2>
        </div>
        <div class="progress-actions">
          <button id="benchmark-recalculate-btn">Tính lại baseline</button>
          <button id="progress-refresh-btn">Làm mới</button>
        </div>
      </div>

      <div class="progress-filters" aria-label="Bộ lọc sprint">
        <label>
          <span>Dự án</span>
          <select id="progress-project-select">
            <option value="">Chọn dự án</option>
          </select>
        </label>
        <label>
          <span>Thành viên</span>
          <select id="progress-member-select" disabled>
            <option value="">Chọn thành viên</option>
          </select>
        </label>
        <label>
          <span>Sprint</span>
          <select id="progress-sprint-select" disabled>
            <option value="">Chọn sprint</option>
          </select>
        </label>
      </div>

      <p id="progress-status" class="status-line neutral"></p>

      <div id="progress-summary" class="progress-summary"></div>
      <div id="today-actions" class="today-actions"></div>
      <div id="task-controls" class="task-controls"></div>
      <div id="task-board" class="task-board">
        <p class="empty-state">Chọn dự án, thành viên và sprint để xem tiến độ.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
